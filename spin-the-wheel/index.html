  <div id="app" class="app-shell" data-theme="light">
    <header class="topbar" role="banner">
      <div class="brand-wrap">

        <a href="/" class="brand-link" data-i18n-aria-label="brand_home_aria">

          <span class="brand-text">
            <strong>CLB Tình Nguyện Trường Y</strong>
            <span class="brand-slogan">Man in Red</span>
          </span>
        </a>
      </div>
      <div class="topbar-actions">
        <button id="settingsButton" class="ghost-btn" type="button" data-i18n="settings"></button>
        <div class="topbar-event-preset">
          <label class="sr-only" for="eventPresetSelect" data-i18n="event_preset"></label>
          <select id="eventPresetSelect" class="topbar-event-select" data-i18n-aria-label="event_preset">
            <option value="default" data-i18n="event_none"></option>
            <option value="classroom" data-i18n="event_classroom"></option>
            <option value="raffle" data-i18n="event_raffle"></option>
            <option value="streamer" data-i18n="event_streamer"></option>
            <option value="party" data-i18n="event_party"></option>
            <option value="minimal" data-i18n="event_minimal"></option>
            <option value="dark-luxury" data-i18n="event_dark_luxury"></option>
          </select>
        </div>
        <button id="fullscreenToggle" class="ghost-btn icon-btn" type="button" data-i18n-aria-label="toggle_fullscreen_aria">⛶</button>
        <button id="themeModeToggle" class="ghost-btn icon-btn" type="button" aria-label="Toggle dark/light mode">🌞</button>
        <button id="libraryButton" class="ghost-btn" type="button" data-i18n="my_wheels"></button>
        <button id="shareButton" class="accent-btn" type="button" data-i18n="share"></button>
        <button id="shortcutButton" class="ghost-btn icon-btn" type="button" data-i18n-aria-label="shortcuts">⌨</button>
      </div>
    </header>

    <main class="main-layout" role="main">
      <section class="wheel-section" data-i18n-aria-label="wheel_section_aria">
        <h1 class="sr-only" data-i18n="app_heading">Spin the Wheel — Spin to Decide</h1>
        <div class="wheel-wrap">
          <div class="wheel-badges">
            <span id="weightedBadge" class="mode-badge hidden" data-i18n="weighted_badge">⚖ Weighted</span>
            <span id="seedBadge" class="mode-badge hidden" data-i18n="seed_badge">🔁 Seeded</span>
          </div>
          <div id="wheelContainer" class="wheel-container">
            <canvas id="wheelCanvas" data-i18n-aria-label="wheel_canvas_aria"></canvas>
            <div class="wheel-glow" aria-hidden="true"></div>
            <div class="wheel-pointer" aria-hidden="true"></div>
            <button id="centerSpinButton" class="center-spin-btn" type="button" data-i18n="spin_button" data-i18n-aria-label="spin_button"></button>
          </div>
          <p id="firstRunHint" class="hint hidden" data-i18n="first_run_hint"></p>
          <p class="club-slogan">❤ Man in Red — Tình Nguyện Trường Y</p>
        </div>
      </section>

      <aside class="side-panel" data-i18n-aria-label="controls_panel_aria">
        <nav class="panel-tabs" data-i18n-aria-label="panel_tabs_aria">
          <button class="tab-btn active" type="button" data-tab="entries" data-i18n="entries_tab"></button>
          <button class="tab-btn" type="button" data-tab="results" data-i18n="results_tab"></button>
          <button id="factoryResetButton" class="tab-btn tab-reset-btn" type="button" data-i18n="reset_app" data-i18n-title="reset_app_tooltip" data-i18n-aria-label="reset_app_tooltip"></button>
        </nav>

        <section id="entriesTab" class="panel-tab active" role="region" data-i18n-aria-label="entries_tab">
          <div class="panel-inline-row hidden" aria-hidden="true">
            <button id="undoButton" class="ghost-btn" type="button" data-i18n="undo" tabindex="-1"></button>
            <button id="redoButton" class="ghost-btn" type="button" data-i18n="redo" tabindex="-1"></button>
            <button id="openLibraryButton" class="ghost-btn" type="button" data-i18n="my_wheels" tabindex="-1"></button>
          </div>
          <div class="entry-actions">
            <button id="shuffleEntriesButton" class="ghost-btn" type="button" data-i18n="shuffle"></button>
            <button id="sortEntriesButton" class="ghost-btn" type="button" data-i18n="sort_az"></button>
            <button id="clearEntriesButton" class="ghost-btn danger-btn" type="button" data-i18n="clear_all"></button>
            <button id="saveAsButton" class="ghost-btn" type="button" data-i18n="save_as"></button>
            <select id="recentWheelsSelect" class="recent-wheels-select" data-i18n-aria-label="recent_wheels"></select>
          </div>
          <span id="entryCountBadge" class="hidden" aria-hidden="true">0</span>
          <div id="entriesList" class="entries-list" role="list"></div>
          <div class="entry-form">
            <label class="sr-only" for="addEntryInput" data-i18n="add_entry"></label>
            <textarea id="addEntryInput" rows="1" data-i18n-placeholder="add_entry_placeholder" maxlength="4000" autocapitalize="sentences"></textarea>
            <button id="addEntryButton" class="accent-btn" type="button" data-i18n="add"></button>
          </div>
          <div class="entry-secondary-actions">
            <button id="pasteListButton" class="ghost-btn" type="button" data-i18n="entry_tools"></button>
            <button id="templateButton" class="ghost-btn" type="button" data-i18n="templates"></button>
            <button id="resetEliminationsButton" class="ghost-btn hidden" type="button" data-i18n="reset_eliminations"></button>
          </div>
          <p id="emptyTemplateHint" class="empty-template-hint hidden">
            <button id="emptyTemplateButton" class="link-btn" type="button" data-i18n="start_from_template"></button>
          </p>
        </section>

        <section id="resultsTab" class="panel-tab" role="region" data-i18n-aria-label="results_tab">
          <div class="panel-topline">
            <button id="historyButton" class="accent-btn" type="button" data-i18n="view_history"></button>
          </div>
          <h3 data-i18n="win_counts"></h3>
          <div id="winCountList" class="win-count-list"></div>
        </section>
      </aside>
    </main>

    <footer class="app-footer" role="contentinfo">
      <p>© CLB Tình Nguyện Trường Y — Man in Red</p>
      <p class="creator-credit">Tạo bởi <strong>Việt Thanh - Y23C - 17 - PRIT</strong></p>

      <button id="fullscreenSettingsButton" class="ghost-btn" type="button" data-i18n="settings"></button>
    </div>

  <div id="modalRoot" class="modal-root">

    <section id="settingsModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="settingsModalTitle">
      <div class="modal-card settings-modal-card">
        <div class="panel-topline">
          <h2 id="settingsModalTitle" data-i18n="settings"></h2>
          <button id="closeSettingsButton" class="ghost-btn" type="button" data-i18n="close"></button>
        </div>
        <div class="settings-modal-shell">
          <nav class="settings-modal-tabs" data-i18n-aria-label="settings_tabs_aria">
            <button class="settings-modal-tab active" type="button" data-settings-tab="general" data-i18n="general"></button>
            <button class="settings-modal-tab" type="button" data-settings-tab="spin" data-i18n="spin_section"></button>
            <button class="settings-modal-tab" type="button" data-settings-tab="theme" data-i18n="theme_section"></button>
            <button class="settings-modal-tab" type="button" data-settings-tab="sound" data-i18n="sound_section"></button>
            <button class="settings-modal-tab" type="button" data-settings-tab="effects" data-i18n="effects_section"></button>
            <button class="settings-modal-tab" type="button" data-settings-tab="probability" data-i18n="probability_inspector"></button>
          </nav>

          <div class="settings-modal-panels">
            <section class="settings-modal-panel active" data-settings-panel="general" role="region" data-i18n-aria-label="general">
              <div class="settings-grid">
                <label class="checkbox-line">
                  <input id="weightsToggle" type="checkbox">
                  <span data-i18n="enable_weights"></span>
                </label>
                <label class="checkbox-line">
                  <input id="manualStopToggle" type="checkbox">
                  <span data-i18n="manual_stop"></span>
                </label>
                <label class="checkbox-line">
                  <input id="mysteryWheelToggle" type="checkbox">
                  <span data-i18n="mystery_wheel"></span>
                </label>
              </div>
            </section>

            <section class="settings-modal-panel" data-settings-panel="spin" role="region" data-i18n-aria-label="spin_section">
              <div class="settings-grid">
                <label for="durationSlider"><span data-i18n="spin_duration"></span>: <output id="durationOutput">5s</output></label>
                <input id="durationSlider" type="range" min="1" max="30" step="1" value="5">
                <label for="turnsSlider"><span data-i18n="spin_turns"></span>: <output id="turnsOutput">8</output></label>
                <input id="turnsSlider" type="range" min="1" max="20" step="1" value="8">
                <label class="checkbox-line">
                  <input id="seedModeToggle" type="checkbox">
                  <span data-i18n="seed_mode"></span>
                </label>
                <label for="seedInput" data-i18n="seed_value"></label>
                <input id="seedInput" type="text" maxlength="120" data-i18n-placeholder="seed_placeholder">
              </div>
            </section>

            <section class="settings-modal-panel" data-settings-panel="theme" role="region" data-i18n-aria-label="theme_section">
              <div class="settings-grid">
                <label for="themeSelect" data-i18n="theme"></label>
                <select id="themeSelect" data-i18n-aria-label="theme"></select>
                <div id="themeSwatches" class="theme-swatch-grid" role="list"></div>
                <label for="pointerStyleSelect" data-i18n="pointer_style"></label>
                <select id="pointerStyleSelect" data-i18n-aria-label="pointer_style">
                  <option value="classic" data-i18n="pointer_classic"></option>
                  <option value="pin" data-i18n="pointer_pin"></option>
                  <option value="diamond" data-i18n="pointer_diamond"></option>
                  <option value="flag" data-i18n="pointer_flag"></option>
                </select>
                <label for="centerTextInput" data-i18n="spin_button_text"></label>
                <input id="centerTextInput" type="text" maxlength="20" data-i18n-placeholder="spin_button">
                <label for="centerColorInput" data-i18n="spin_button_color"></label>
                <input id="centerColorInput" type="color" value="#e63946">
                <div class="panel-inline-row">
                  <button id="centerImageButton" class="ghost-btn" type="button" data-i18n="upload_center_image"></button>
                  <button id="removeCenterImageButton" class="ghost-btn" type="button" data-i18n="remove_center_image"></button>
                </div>
                <label for="backgroundTypeSelect" data-i18n="background_type"></label>
                <select id="backgroundTypeSelect" data-i18n-aria-label="background_type">
                  <option value="default" data-i18n="background_default"></option>
                  <option value="solid" data-i18n="background_solid"></option>
                  <option value="gradient" data-i18n="background_gradient"></option>
                  <option value="image" data-i18n="background_image"></option>
                </select>
                <label for="backgroundSolidInput" data-i18n="background_solid_color"></label>
                <input id="backgroundSolidInput" type="color" value="#2b0a0d">
                <label for="backgroundFromInput" data-i18n="background_gradient_from"></label>
                <input id="backgroundFromInput" type="color" value="#2b0a0d">
                <label for="backgroundToInput" data-i18n="background_gradient_to"></label>
                <input id="backgroundToInput" type="color" value="#6f1d27">
                <label for="backgroundAngleInput" data-i18n="background_gradient_angle"></label>
                <input id="backgroundAngleInput" type="range" min="0" max="360" step="1" value="150">
                <div class="panel-inline-row">
                  <button id="backgroundImageButton" class="ghost-btn" type="button" data-i18n="upload_background_image"></button>
                  <button id="removeBackgroundImageButton" class="ghost-btn" type="button" data-i18n="remove_background_image"></button>
                </div>
              </div>
            </section>

            <section class="settings-modal-panel" data-settings-panel="sound" role="region" data-i18n-aria-label="sound_section">
              <div class="settings-grid">
                <label for="volumeSlider"><span data-i18n="volume"></span>: <output id="volumeOutput">70%</output></label>
                <input id="volumeSlider" type="range" min="0" max="100" step="1" value="70">

                <select id="tickSoundSelect" data-i18n-aria-label="tick_sound_variant">

                  <option value="pop" data-i18n="tick_pop"></option>
                  <option value="wooden" data-i18n="tick_wooden"></option>
                  <option value="digital" data-i18n="tick_digital"></option>
                  <option value="soft" data-i18n="tick_soft"></option>
                </select>
                <label class="checkbox-line">
                  <input id="winSoundToggle" type="checkbox">
                  <span data-i18n="win_sound"></span>
                </label>
                <label for="winSoundSelect" data-i18n="win_sound_variant"></label>
                <select id="winSoundSelect" data-i18n-aria-label="win_sound_variant">
                  <option value="fanfare" data-i18n="win_fanfare"></option>
                  <option value="applause" data-i18n="win_applause"></option>
                  <option value="chime" data-i18n="win_chime"></option>
                  <option value="sparkle" data-i18n="win_sparkle"></option>
                </select>
                <label class="checkbox-line">
                  <input id="spinSoundToggle" type="checkbox">
                  <span data-i18n="spin_ambient"></span>
                </label>
                <label for="spinSoundSelect" data-i18n="spin_sound_variant"></label>
                <select id="spinSoundSelect" data-i18n-aria-label="spin_sound_variant">
                  <option value="whoosh" data-i18n="spin_whoosh"></option>
                  <option value="wind" data-i18n="spin_wind"></option>
                  <option value="hum" data-i18n="spin_hum"></option>
                </select>
              </div>
            </section>

            <section class="settings-modal-panel" data-settings-panel="effects" role="region" data-i18n-aria-label="effects_section">
              <div class="settings-grid">
                <label for="celebrationSelect" data-i18n="celebration_effect"></label>
                <select id="celebrationSelect" data-i18n-aria-label="celebration_effect">

                  <option value="fireworks" data-i18n="celebration_fireworks"></option>

                <label class="checkbox-line">
                  <input id="cinematicModeToggle" type="checkbox">

    </section>

    <section id="pasteModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="pasteModalTitle">
      <div class="modal-card">
        <h2 id="pasteModalTitle" data-i18n="paste_list"></h2>
        <textarea id="pasteTextarea" rows="10" data-i18n-placeholder="paste_placeholder"></textarea>
        <div class="modal-actions">
          <button id="importDataButton" class="ghost-btn" type="button" data-i18n="import_csv_json"></button>
          <button id="exportDataButton" class="ghost-btn" type="button" data-i18n="export_csv_json"></button>
        </div>
        <div class="modal-actions">
          <button id="pasteCancelButton" class="ghost-btn" type="button" data-i18n="cancel"></button>
          <button id="pasteApplyButton" class="accent-btn" type="button" data-i18n="apply"></button>
        </div>
      </div>
    </section>

    <section id="resultModal" class="modal result-modal hidden" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
      <div class="modal-card result-card">
        <h2 id="resultTitle" data-i18n="winner"></h2>
        <p id="resultWinner" class="winner-name">-</p>
        <p id="resultSubtitle" class="winner-subtitle hidden"></p>
        <div class="modal-actions">
          <button id="spinAgainButton" class="accent-btn" type="button" data-i18n="spin_again"></button>
          <button id="removeWinnerButton" class="ghost-btn danger-btn hidden" type="button" data-i18n="remove_winner"></button>
          <button id="closeResultButton" class="ghost-btn" type="button" data-i18n="close"></button>
        </div>
      </div>
    </section>

    <section id="factoryResetModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="factoryResetTitle" aria-describedby="factoryResetDescription">
      <div class="modal-card confirm-card">
        <h2 id="factoryResetTitle"></h2>
        <p id="factoryResetDescription" class="small-note"></p>
        <div class="modal-actions">
          <button id="factoryResetCancelButton" class="ghost-btn" type="button" data-i18n="cancel"></button>
          <button id="factoryResetConfirmButton" class="ghost-btn danger-btn" type="button"></button>
        </div>
      </div>
    </section>

    <section id="shareModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="shareTitle">
      <div class="modal-card">
        <h2 id="shareTitle" data-i18n="share_wheel"></h2>
        <p class="small-note" data-i18n="share_privacy_note"></p>
        <fieldset class="radio-group">
          <legend data-i18n="share_mode"></legend>
          <label><input type="radio" name="shareMode" value="full" checked> <span data-i18n="share_full_edit"></span></label>
          <label><input type="radio" name="shareMode" value="spin-only"> <span data-i18n="share_spin_only"></span></label>
        </fieldset>
        <label for="shareUrlInput" data-i18n="share_link"></label>
        <input id="shareUrlInput" type="text" readonly>
        <p id="shareSizeStatus" class="size-status"></p>
        <fieldset class="radio-group">
          <legend data-i18n="embed_title"></legend>
          <label for="embedWidthInput" data-i18n="embed_width"></label>
          <input id="embedWidthInput" type="number" min="280" max="2000" step="10" value="720">
          <label for="embedHeightInput" data-i18n="embed_height"></label>
          <input id="embedHeightInput" type="number" min="280" max="2000" step="10" value="720">
          <label for="embedCodeInput" data-i18n="embed_code"></label>
          <textarea id="embedCodeInput" rows="3" readonly></textarea>
          <button id="copyEmbedButton" class="ghost-btn" type="button" data-i18n="copy_embed_code"></button>
        </fieldset>
        <fieldset class="radio-group">
          <legend data-i18n="qr_code"></legend>
          <canvas id="qrCanvas" width="220" height="220" data-i18n-aria-label="qr_code"></canvas>
          <button id="downloadQrButton" class="ghost-btn" type="button" data-i18n="download_qr"></button>
        </fieldset>
        <div class="modal-actions">
          <button id="copyShareButton" class="accent-btn" type="button" data-i18n="copy_link"></button>
          <button id="closeShareButton" class="ghost-btn" type="button" data-i18n="close"></button>
        </div>
      </div>
    </section>

    <section id="libraryModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="libraryTitle">
      <div class="modal-card template-card">
        <h2 id="libraryTitle" data-i18n="my_wheels"></h2>
        <div id="libraryList" class="library-list"></div>
        <div class="modal-actions">
          <button id="closeLibraryButton" class="ghost-btn" type="button" data-i18n="close"></button>
        </div>
      </div>
    </section>

    <section id="csvMapModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="csvMapTitle">
      <div class="modal-card">
        <h2 id="csvMapTitle" data-i18n="csv_mapping_title"></h2>
        <div class="settings-grid">
          <label for="csvLabelColumn" data-i18n="csv_label_column"></label>
          <select id="csvLabelColumn"></select>
          <label for="csvWeightColumn" data-i18n="csv_weight_column"></label>
          <select id="csvWeightColumn"></select>
          <label for="csvColorColumn" data-i18n="csv_color_column"></label>
          <select id="csvColorColumn"></select>
        </div>
        <div class="modal-actions">
          <button id="csvMapCancelButton" class="ghost-btn" type="button" data-i18n="cancel"></button>
          <button id="csvMapApplyButton" class="accent-btn" type="button" data-i18n="apply"></button>
        </div>
      </div>
    </section>

    <section id="exportModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="exportModalTitle">
      <div class="modal-card">
        <h2 id="exportModalTitle" data-i18n="export_title"></h2>
        <fieldset class="radio-group">
          <legend data-i18n="export_format"></legend>
          <label><input type="radio" name="exportFormat" value="csv" checked> <span data-i18n="export_csv"></span></label>
          <label><input type="radio" name="exportFormat" value="json"> <span data-i18n="export_json"></span></label>
        </fieldset>
        <div class="modal-actions">
          <button id="exportCancelButton" class="ghost-btn" type="button" data-i18n="cancel"></button>
          <button id="exportApplyButton" class="accent-btn" type="button" data-i18n="export_action"></button>
        </div>
      </div>
    </section>

    <section id="historyModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="historyTitle">
      <div class="modal-card template-card">
        <h2 id="historyTitle" data-i18n="history"></h2>
        <div id="resultsList" class="results-list"></div>
        <div class="modal-actions">
          <button id="clearResultsButton" class="ghost-btn danger-btn" type="button" data-i18n="clear_results"></button>
          <button id="exportResultsCsvButton" class="ghost-btn" type="button" data-i18n="export_results_csv"></button>
          <button id="exportAuditJsonButton" class="ghost-btn" type="button" data-i18n="export_audit_json"></button>
          <button id="closeHistoryButton" class="ghost-btn" type="button" data-i18n="close"></button>
        </div>
      </div>
    </section>

    <section id="templateModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="templateTitle">
      <div class="modal-card template-card">
        <h2 id="templateTitle" data-i18n="templates"></h2>
        <div id="templateGrid" class="template-grid"></div>
        <div class="modal-actions">
          <button id="closeTemplateButton" class="ghost-btn" type="button" data-i18n="close"></button>
        </div>
      </div>
    </section>

    <section id="shortcutModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="shortcutTitle">
      <div class="modal-card">
        <h2 id="shortcutTitle" data-i18n="shortcuts"></h2>
        <ul class="shortcut-list">
          <li><kbd>Ctrl</kbd>/<kbd>Cmd</kbd> + <kbd>K</kbd> — <span data-i18n="shortcut_spin"></span></li>
          <li><kbd>F11</kbd> — <span data-i18n="shortcut_fullscreen"></span></li>
          <li><kbd>Ctrl</kbd> + <kbd>S</kbd> — <span data-i18n="shortcut_save"></span></li>
          <li><kbd>Escape</kbd> — <span data-i18n="shortcut_close"></span></li>
        </ul>
        <div class="modal-actions">
          <button id="closeShortcutButton" class="ghost-btn" type="button" data-i18n="close"></button>
        </div>
      </div>
    </section>
  </div>

  <div id="ariaLive" class="sr-only" aria-live="assertive"></div>
  <div id="toastRoot" class="toast-root" aria-live="polite"></div>

  <input id="importDataFileInput" class="sr-only" type="file" accept=".csv,.json,text/csv,application/json">
  <input id="centerImageInput" class="sr-only" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
  <input id="backgroundImageInput" class="sr-only" type="file" accept="image/png,image/jpeg,image/webp,image/gif">

  <script type="module" src="/app.js"></script>

</body>
</html>
